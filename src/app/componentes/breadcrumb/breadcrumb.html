<nav class="br-breadcrumb">
  <ol class="crumb-list" role="list">

    <!-- Home -->
    <li class="crumb home">
      <a class="br-button circle" routerLink="/">
        <span class="sr-only">Página inicial</span>
        <i class="fas fa-home"></i>
      </a>
    </li>

    <ng-container *ngFor="let item of items; let last = last">

      <!-- itens intermediários -->
      <li class="crumb" *ngIf="!last">
        <i class="icon fas fa-chevron-right"></i>
        <a [routerLink]="item.url">
          {{ item.label }}
        </a>
      </li>

      <!-- item atual -->
      <li class="crumb" data-active="active" *ngIf="last">
        <i class="icon fas fa-chevron-right"></i>
        <span tabindex="0" aria-current="page">
          {{ item.label }}
        </span>
      </li>

    </ng-container>

  </ol>
</nav>
