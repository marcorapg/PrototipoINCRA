<div class="br-select">
  <div class="br-input">
    <label [for]="id">{{ label }}</label>

    <input
      [id]="id"
      type="text"
      [placeholder]="placeholder"
    />

    <button
      class="br-button"
      type="button"
      aria-label="Exibir lista"
      tabindex="-1"
      data-trigger="data-trigger">

      <i class="fas fa-angle-down" aria-hidden="true"></i>

    </button>
  </div>

  <div class="br-list" tabindex="0">

    <div
      class="br-item"
      tabindex="-1"
      *ngFor="let option of options; let i = index">

      <div class="br-radio">

        <input
          [id]="id + '-rb' + i"
          type="radio"
          [name]="id"
          [value]="option.value"
        />

        <label [for]="id + '-rb' + i">
          {{ option.label }}
        </label>

      </div>

    </div>

  </div>
</div>
